<!DOCTYPE html>
<html lang="en">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>{{title}}</title>
 <!-- Fonts from hellostu.xyz: Inter (for headings), Outfit (for logo text), Gochi Hand (for "Hello Stu") -->
 <link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Outfit:wght@700&family=Gochi+Hand&display=block"
  rel="stylesheet">
 <style>
  body {
   margin: 0;
   padding: 0;
   width: 1200px;
   height: 630px;
   display: flex;
   justify-content: center;
   align-items: center;
   background-color: #fff;
   background-image: linear-gradient(#b1e9ff 1px, transparent 1px),
    linear-gradient(to right, #b1e9ff 1px, #fff 1px);
   background-size: 20px 20px;
   color: #000000;
   font-family: 'Inter', sans-serif;
   text-align: center;
   overflow: hidden;
   position: relative;
   box-sizing: border-box;
  }

  .container {
   position: relative;
   width: 1100px;
   height: 550px;
   display: flex;
   flex-direction: column;
   justify-content: center;
   align-items: flex-start;
   padding: 40px;
   box-sizing: border-box;
   z-index: 10;
   background-color: #fff;
   border: 8px solid #000;
   box-shadow: 12px 12px 0px #000;
  }

  .bg-image {
   position: absolute;
   top: 0;
   left: 0;
   width: 100%;
   height: 100%;
   object-fit: cover;
   z-index: 1;
   opacity: 0.7;
   /* Adjusted opacity so title remains legible */
  }

  h1 {
   position: relative;
   z-index: 10;
   font-size: 72px;
   font-weight: 900;
   margin: 0;
   line-height: 1.1;
   text-transform: uppercase;
   letter-spacing: -2px;
   max-width: 100%;
   word-wrap: break-word;
   background: #000;
   color: #fffc00;
   padding: 10px 30px;
   text-align: left;
   align-self: flex-start;
  }

  .logo-area {
   position: absolute;
   bottom: 20px;
   right: 1px;
   display: flex;
   align-items: center;
   gap: 12px;
   z-index: 10;
  }

  .logo-text {
   color: #000000;
   background-color: #fff;
   border-top: #000 4px dashed;
   border-bottom: #000 4px dashed;
   border-left: #000 4px dashed;
   padding-right: 40px;
   padding-top: 10px;
   padding-left: 15px;
   font-size: 64px;
   font-weight: 700;
   font-family: 'Gochi Hand', cursive;
   text-transform: none;
  }
 </style>
</head>

<body>
 <div class="container">
  {{postImageHtml}}
  <h1>{{title}}</h1>
  <div class="logo-area">
   <span class="logo-text">Hello Stu</span>
  </div>
 </div>
</body>

</html>
