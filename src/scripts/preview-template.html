<!-- Simple preview image template: just the post image, no overlays or text -->

<html lang="en">

<head>
 <meta charset="UTF-8" />
 <style>
  html,
  body {

  }

  .bg-image {
   width: 100vw;
   height: 100vh;
   object-fit: cover;
   display: block;
  }
 </style>
